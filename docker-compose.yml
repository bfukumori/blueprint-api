services:
  postgres:
    image: postgres:16-alpine
    container_name: blueprint_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: blueprint_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d blueprint_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: blueprint_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: curlimages/curl:latest
    container_name: blueprint_ollama_init
    depends_on:
      - ollama
    command: >
      sh -c "
      echo 'Aguardando Ollama iniciar...' && 
      until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 3; done; 
      echo 'Ollama online! Baixando modelo qwen2.5:7b...' && 
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:7b\"}'
      "

  n8n:
    image: n8nio/n8n:latest
    container_name: blueprint_n8n
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
  ollama_data: